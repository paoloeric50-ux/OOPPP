<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - MotorPH Payroll</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="/css/app.css" rel="stylesheet"/>
</head>
<body>
<div class="auth-container">
  <div class="auth-card" style="max-width:480px;">
    <div class="text-center mb-4">
      <div class="auth-logo"><i class="bi bi-cpu-fill text-white fs-4"></i></div>
      <h4 class="fw-bold text-white mb-1">Create Account</h4>
      <p class="text-muted small">Register for MotorPH Payroll System</p>
    </div>

    <div id="error-msg" class="alert alert-danger-glass mb-3 d-none"></div>

    <form id="register-form">
      <div class="row g-3">
        <div class="col-6">
          <label class="form-label">First Name</label>
          <input type="text" id="firstName" class="form-control" placeholder="Juan" required/>
        </div>
        <div class="col-6">
          <label class="form-label">Last Name</label>
          <input type="text" id="lastName" class="form-control" placeholder="Dela Cruz" required/>
        </div>
      </div>
      <div class="mb-3 mt-3">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Min. 8 characters" required autocomplete="new-password"/>
      </div>
      <div class="mb-4">
        <label class="form-label">Role</label>
        <select id="role" class="form-select">
          <option value="hr">HR Admin</option>
          <option value="payroll">Payroll Officer</option>
          <option value="manager">Manager</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2" id="register-btn">
        <span id="btn-text">Create Account</span>
        <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
      </button>
    </form>

    <hr style="border-color:rgba(255,255,255,0.1);" class="my-4"/>
    <p class="text-center text-muted small mb-0">
      Already have an account?
      <a href="/login" class="text-primary text-decoration-none">Sign in</a>
    </p>
  </div>
</div>

<script>
  if (localStorage.getItem('token')) window.location.href = '/dashboard';

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('register-btn');
    const spinner = document.getElementById('btn-spinner');
    const errorEl = document.getElementById('error-msg');
    btn.disabled = true;
    spinner.classList.remove('d-none');
    errorEl.classList.add('d-none');
    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          firstName: document.getElementById('firstName').value,
          lastName: document.getElementById('lastName').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          role: document.getElementById('role').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || data.error || 'Registration failed');
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('user', JSON.stringify(data.user || { email: document.getElementById('email').value }));
      window.location.href = '/dashboard';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('d-none');
    } finally {
      btn.disabled = false;
      spinner.classList.add('d-none');
    }
  });
</script>
</body>
</html>
