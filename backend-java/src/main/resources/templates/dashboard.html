<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - MotorPH Payroll</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="/css/app.css" rel="stylesheet"/>
</head>
<body>
<div class="d-flex">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <main class="main-content flex-grow-1">
    <div class="page-header">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <h1 class="text-white">Dashboard</h1>
          <p>Welcome back! Here's your payroll overview.</p>
        </div>
        <div class="text-end text-muted small" id="current-date"></div>
      </div>
    </div>

    <!-- Stats Cards -->
    <div class="row g-4 mb-4" id="stats-row">
      <div class="col-12 col-sm-6 col-xl-3">
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(99,102,241,0.15);">
            <i class="bi bi-people-fill" style="color:#a5b4fc;"></i>
          </div>
          <div class="stat-value text-white" id="stat-employees">--</div>
          <div class="stat-label">Total Employees</div>
          <div class="mt-2 small" id="stat-employees-sub" style="color:#6ee7b7;"></div>
        </div>
      </div>
      <div class="col-12 col-sm-6 col-xl-3">
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(16,185,129,0.15);">
            <i class="bi bi-check-circle-fill" style="color:#6ee7b7;"></i>
          </div>
          <div class="stat-value text-white" id="stat-present">--</div>
          <div class="stat-label">Present Today</div>
          <div class="mt-2 small" id="stat-present-sub" style="color:#94a3b8;"></div>
        </div>
      </div>
      <div class="col-12 col-sm-6 col-xl-3">
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(245,158,11,0.15);">
            <i class="bi bi-cash-stack" style="color:#fcd34d;"></i>
          </div>
          <div class="stat-value text-white" id="stat-payroll">--</div>
          <div class="stat-label">Monthly Payroll</div>
          <div class="mt-2 small" id="stat-payroll-sub" style="color:#94a3b8;"></div>
        </div>
      </div>
      <div class="col-12 col-sm-6 col-xl-3">
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(59,130,246,0.15);">
            <i class="bi bi-receipt" style="color:#93c5fd;"></i>
          </div>
          <div class="stat-value text-white" id="stat-payslips">--</div>
          <div class="stat-label">Payslips Generated</div>
          <div class="mt-2 small" id="stat-payslips-sub" style="color:#94a3b8;"></div>
        </div>
      </div>
    </div>

    <div class="row g-4 mb-4">
      <!-- Employee Distribution Chart -->
      <div class="col-12 col-lg-5">
        <div class="glass-card h-100">
          <h6 class="fw-semibold text-white mb-4">
            <i class="bi bi-pie-chart me-2" style="color:#a5b4fc;"></i>Employee Distribution
          </h6>
          <canvas id="empTypeChart" height="220"></canvas>
          <div class="mt-3 d-flex justify-content-center gap-4" id="chart-legend"></div>
        </div>
      </div>

      <!-- Attendance Overview Chart -->
      <div class="col-12 col-lg-7">
        <div class="glass-card h-100">
          <h6 class="fw-semibold text-white mb-4">
            <i class="bi bi-bar-chart me-2" style="color:#6ee7b7;"></i>Department Breakdown
          </h6>
          <canvas id="deptChart" height="220"></canvas>
        </div>
      </div>
    </div>

    <!-- Recent Employees -->
    <div class="glass-card">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h6 class="fw-semibold text-white mb-0">
          <i class="bi bi-people me-2" style="color:#a5b4fc;"></i>Recent Employees
        </h6>
        <a href="/employees" class="btn btn-outline-light btn-sm">View All</a>
      </div>
      <div class="table-responsive">
        <table class="table glass-table mb-0">
          <thead>
          <tr>
            <th>Employee</th>
            <th>Position</th>
            <th>Department</th>
            <th>Type</th>
            <th>Status</th>
          </tr>
          </thead>
          <tbody id="recent-employees-body">
          <tr><td colspan="5" class="text-center text-muted py-4">
            <div class="spinner-border spinner-border-sm me-2"></div>Loading...
          </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="/js/app.js"></script>
<script>
  if (!Auth.requireAuth()) { /* redirected */ }

  document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  async function loadDashboard() {
    try {
      const stats = await API.get('/dashboard/stats');

      document.getElementById('stat-employees').textContent = stats.totalEmployees ?? '--';
      document.getElementById('stat-employees-sub').textContent =
        `${stats.activeEmployees ?? 0} active`;

      document.getElementById('stat-present').textContent = stats.presentToday ?? '--';
      document.getElementById('stat-present-sub').textContent =
        `${stats.lateToday ?? 0} late today`;

      document.getElementById('stat-payroll').textContent =
        formatCurrency(stats.totalMonthlyPayroll);
      document.getElementById('stat-payroll-sub').textContent = 'This month';

      document.getElementById('stat-payslips').textContent = stats.totalPayslips ?? '--';
      document.getElementById('stat-payslips-sub').textContent = 'All time';

      // Employee type chart
      const typeData = stats.employeesByType || {};
      const typeLabels = Object.keys(typeData);
      const typeValues = Object.values(typeData);
      const typeColors = ['#6366f1', '#f59e0b', '#ec4899'];

      new Chart(document.getElementById('empTypeChart'), {
        type: 'doughnut',
        data: {
          labels: typeLabels.map(l => l.replace('-', ' ').replace(/\b\w/g, c => c.toUpperCase())),
          datasets: [{ data: typeValues, backgroundColor: typeColors, borderWidth: 0, hoverOffset: 8 }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: (ctx) => ` ${ctx.label}: ${ctx.raw}` } }
          },
          cutout: '65%'
        }
      });

      // Legend
      const legend = document.getElementById('chart-legend');
      typeLabels.forEach((label, i) => {
        legend.innerHTML += `<div class="d-flex align-items-center gap-1 small">
          <span style="width:10px;height:10px;border-radius:50%;background:${typeColors[i]};display:inline-block;"></span>
          <span class="text-muted">${label.replace('-',' ').replace(/\b\w/g,c=>c.toUpperCase())}: <strong class="text-white">${typeValues[i]}</strong></span>
        </div>`;
      });

      // Department chart
      const deptData = stats.employeesByDepartment || {};
      const deptLabels = Object.keys(deptData);
      const deptValues = Object.values(deptData);
      new Chart(document.getElementById('deptChart'), {
        type: 'bar',
        data: {
          labels: deptLabels,
          datasets: [{
            label: 'Employees',
            data: deptValues,
            backgroundColor: 'rgba(99,102,241,0.5)',
            borderColor: '#6366f1',
            borderWidth: 1,
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
            y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8', stepSize: 1 } }
          }
        }
      });

      // Recent employees
      const employees = stats.recentEmployees || [];
      const tbody = document.getElementById('recent-employees-body');
      if (!employees.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No employees found</td></tr>';
      } else {
        tbody.innerHTML = employees.map(emp => `
          <tr>
            <td>
              <div class="d-flex align-items-center gap-2">
                <div class="emp-avatar">${getInitials(emp.firstName + ' ' + emp.lastName)}</div>
                <div>
                  <div class="fw-semibold text-white small">${emp.firstName} ${emp.lastName}</div>
                  <div class="text-muted" style="font-size:0.75rem;">${emp.employeeId || ''}</div>
                </div>
              </div>
            </td>
            <td class="text-muted small">${emp.position || '-'}</td>
            <td class="text-muted small">${emp.department || '-'}</td>
            <td>${getTypeBadge(emp.employeeType)}</td>
            <td>${getStatusBadge(emp.status)}</td>
          </tr>
        `).join('');
      }
    } catch (err) {
      Toast.error('Failed to load dashboard: ' + err.message);
    }
  }

  loadDashboard();
</script>
</body>
</html>
