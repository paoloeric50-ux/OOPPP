<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - MotorPH Payroll</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="/css/app.css" rel="stylesheet"/>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="auth-logo"><i class="bi bi-cpu-fill text-white fs-4"></i></div>
      <h4 class="fw-bold text-white mb-1">MotorPH Payroll</h4>
      <p class="text-muted small">Sign in to your account</p>
    </div>

    <div id="error-msg" class="alert alert-danger-glass mb-3 d-none"></div>

    <form id="login-form">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0" style="border-color:rgba(255,255,255,0.1);color:#94a3b8;">
            <i class="bi bi-envelope"></i>
          </span>
          <input type="email" id="email" class="form-control border-start-0" placeholder="you@example.com" required
                 style="border-left:none;" autocomplete="email"/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0" style="border-color:rgba(255,255,255,0.1);color:#94a3b8;">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" id="password" class="form-control border-start-0" placeholder="••••••••" required
                 style="border-left:none;" autocomplete="current-password"/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2" id="login-btn">
        <span id="btn-text">Sign In</span>
        <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
      </button>
    </form>

    <hr style="border-color:rgba(255,255,255,0.1);" class="my-4"/>
    <p class="text-center text-muted small mb-0">
      Don't have an account?
      <a href="/register" class="text-primary text-decoration-none">Register here</a>
    </p>
  </div>
</div>

<script>
  if (localStorage.getItem('token')) window.location.href = '/dashboard';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const spinner = document.getElementById('btn-spinner');
    const errorEl = document.getElementById('error-msg');
    btn.disabled = true;
    spinner.classList.remove('d-none');
    errorEl.classList.add('d-none');
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || data.error || 'Login failed');
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('user', JSON.stringify(data.user || { email: document.getElementById('email').value }));
      window.location.href = '/dashboard';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('d-none');
    } finally {
      btn.disabled = false;
      spinner.classList.add('d-none');
    }
  });
</script>
</body>
</html>
