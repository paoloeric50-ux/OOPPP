<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Form - MotorPH Payroll</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="/css/app.css" rel="stylesheet"/>
</head>
<body>
<div class="d-flex">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <main class="main-content flex-grow-1">
    <div class="page-header">
      <div class="d-flex align-items-center gap-3 mb-2">
        <a href="/employees" class="btn btn-outline-light btn-sm">
          <i class="bi bi-arrow-left me-1"></i>Back
        </a>
        <div>
          <h1 class="text-white mb-0" id="page-title">Add Employee</h1>
          <p id="page-subtitle" class="mb-0">Fill in the employee details below.</p>
        </div>
      </div>
    </div>

    <div id="error-msg" class="alert alert-danger-glass mb-4 d-none"></div>

    <form id="employee-form">
      <div class="row g-4">
        <!-- Personal Information -->
        <div class="col-12 col-lg-6">
          <div class="glass-card h-100">
            <h6 class="fw-semibold text-white mb-4">
              <i class="bi bi-person me-2" style="color:#a5b4fc;"></i>Personal Information
            </h6>
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">First Name *</label>
                <input type="text" id="firstName" class="form-control" required placeholder="Juan"/>
              </div>
              <div class="col-6">
                <label class="form-label">Last Name *</label>
                <input type="text" id="lastName" class="form-control" required placeholder="Dela Cruz"/>
              </div>
              <div class="col-12">
                <label class="form-label">Email *</label>
                <input type="email" id="email" class="form-control" required placeholder="juan@motorph.com"/>
              </div>
              <div class="col-12">
                <label class="form-label">Phone</label>
                <input type="text" id="phone" class="form-control" placeholder="+63 9XX XXX XXXX"/>
              </div>
              <div class="col-12">
                <label class="form-label">Address</label>
                <textarea id="address" class="form-control" rows="2" placeholder="Complete address..."></textarea>
              </div>
            </div>
          </div>
        </div>

        <!-- Employment Details -->
        <div class="col-12 col-lg-6">
          <div class="glass-card h-100">
            <h6 class="fw-semibold text-white mb-4">
              <i class="bi bi-briefcase me-2" style="color:#6ee7b7;"></i>Employment Details
            </h6>
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label">Employee ID</label>
                <input type="text" id="employeeId" class="form-control" placeholder="e.g. EMP-001"/>
                <div class="form-text text-muted" style="font-size:0.75rem;">Leave blank to auto-generate</div>
              </div>
              <div class="col-12">
                <label class="form-label">Employee Type *</label>
                <select id="employeeType" class="form-select" required onchange="updateRateFields()">
                  <option value="">Select type...</option>
                  <option value="full-time">Full-Time</option>
                  <option value="part-time">Part-Time</option>
                  <option value="contract">Contract</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Position *</label>
                <input type="text" id="position" class="form-control" required placeholder="Software Engineer"/>
              </div>
              <div class="col-12">
                <label class="form-label">Department</label>
                <select id="department" class="form-select">
                  <option value="">Select department...</option>
                  <option>Engineering</option>
                  <option>Human Resources</option>
                  <option>Finance</option>
                  <option>Operations</option>
                  <option>Sales</option>
                  <option>Marketing</option>
                  <option>IT</option>
                  <option>Legal</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Status</label>
                <select id="status" class="form-select">
                  <option value="active">Active</option>
                  <option value="inactive">Inactive</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Hire Date</label>
                <input type="date" id="hireDate" class="form-control"/>
              </div>
            </div>
          </div>
        </div>

        <!-- Compensation -->
        <div class="col-12">
          <div class="glass-card">
            <h6 class="fw-semibold text-white mb-4">
              <i class="bi bi-cash-stack me-2" style="color:#fcd34d;"></i>Compensation
            </h6>
            <div class="row g-3">
              <!-- Full-time fields -->
              <div id="fulltime-fields">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label">Monthly Rate (PHP)</label>
                    <input type="number" id="monthlyRate" class="form-control" min="0" step="0.01" placeholder="30000.00"/>
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label">Overtime Rate per Hour (PHP)</label>
                    <input type="number" id="overtimeRate" class="form-control" min="0" step="0.01" placeholder="250.00"/>
                  </div>
                </div>
              </div>
              <!-- Part-time fields -->
              <div id="parttime-fields" class="d-none">
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label">Hourly Rate (PHP)</label>
                    <input type="number" id="hourlyRate" class="form-control" min="0" step="0.01" placeholder="150.00"/>
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label">Max Hours per Week</label>
                    <input type="number" id="maxHoursPerWeek" class="form-control" min="0" placeholder="20"/>
                  </div>
                </div>
              </div>
              <!-- Contract fields -->
              <div id="contract-fields" class="d-none">
                <div class="row g-3">
                  <div class="col-12 col-md-4">
                    <label class="form-label">Daily Rate (PHP)</label>
                    <input type="number" id="dailyRate" class="form-control" min="0" step="0.01" placeholder="1500.00"/>
                  </div>
                  <div class="col-12 col-md-4">
                    <label class="form-label">Contract Start</label>
                    <input type="date" id="contractStart" class="form-control"/>
                  </div>
                  <div class="col-12 col-md-4">
                    <label class="form-label">Contract End</label>
                    <input type="date" id="contractEnd" class="form-control"/>
                  </div>
                </div>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">SSS Number</label>
                <input type="text" id="sssNumber" class="form-control" placeholder="XX-XXXXXXX-X"/>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">PhilHealth Number</label>
                <input type="text" id="philhealthNumber" class="form-control" placeholder="XXXX-XXXX-XXXX"/>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">TIN</label>
                <input type="text" id="tin" class="form-control" placeholder="XXX-XXX-XXX-XXX"/>
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">Pag-IBIG Number</label>
                <input type="text" id="pagibigNumber" class="form-control" placeholder="XXXX-XXXX-XXXX"/>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex gap-3 justify-content-end mt-4">
        <a href="/employees" class="btn btn-outline-light px-4">Cancel</a>
        <button type="submit" class="btn btn-primary px-5" id="submit-btn">
          <span id="submit-text">Save Employee</span>
          <span id="submit-spinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
        </button>
      </div>
    </form>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
  if (!Auth.requireAuth()) { /* redirected */ }

  const pathParts = window.location.pathname.split('/');
  const isEdit = pathParts.includes('edit');
  const empId = isEdit ? pathParts[pathParts.indexOf('employees') + 1] : null;

  if (isEdit) {
    document.getElementById('page-title').textContent = 'Edit Employee';
    document.getElementById('page-subtitle').textContent = 'Update employee information.';
  }

  function updateRateFields() {
    const type = document.getElementById('employeeType').value;
    document.getElementById('fulltime-fields').classList.toggle('d-none', type !== 'full-time');
    document.getElementById('parttime-fields').classList.toggle('d-none', type !== 'part-time');
    document.getElementById('contract-fields').classList.toggle('d-none', type !== 'contract');
  }

  async function loadEmployee(id) {
    try {
      const emp = await API.get('/employees/' + id);
      document.getElementById('employeeId').value = emp.employee_id || '';
      document.getElementById('firstName').value = emp.first_name || '';
      document.getElementById('lastName').value = emp.last_name || '';
      document.getElementById('email').value = emp.email || '';
      document.getElementById('phone').value = emp.phone || '';
      document.getElementById('address').value = emp.address || '';
      document.getElementById('employeeType').value = emp.employee_type || '';
      document.getElementById('position').value = emp.position || '';
      document.getElementById('department').value = emp.department || '';
      document.getElementById('status').value = emp.status || 'active';
      document.getElementById('hireDate').value = emp.date_hired ? emp.date_hired.slice(0, 10) : '';
      document.getElementById('monthlyRate').value = emp.basic_salary || '';
      document.getElementById('overtimeRate').value = emp.overtime_rate || '';
      document.getElementById('hourlyRate').value = emp.hourly_rate || '';
      document.getElementById('maxHoursPerWeek').value = emp.hours_per_week || '';
      document.getElementById('dailyRate').value = emp.daily_rate || '';
      document.getElementById('contractStart').value = '';
      document.getElementById('contractEnd').value = emp.contract_end_date ? emp.contract_end_date.slice(0, 10) : '';
      document.getElementById('sssNumber').value = emp.sss_number || '';
      document.getElementById('philhealthNumber').value = emp.philhealth_number || '';
      document.getElementById('tin').value = emp.tin || '';
      document.getElementById('pagibigNumber').value = emp.pagibig_number || '';
      updateRateFields();
    } catch (err) {
      Toast.error('Failed to load employee: ' + err.message);
    }
  }

  document.getElementById('employee-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const spinner = document.getElementById('submit-spinner');
    const errorEl = document.getElementById('error-msg');
    btn.disabled = true;
    spinner.classList.remove('d-none');
    errorEl.classList.add('d-none');

    const type = document.getElementById('employeeType').value;
    const empIdVal = document.getElementById('employeeId').value.trim();
    const payload = {
      ...(empIdVal ? { employeeId: empIdVal } : {}),
      firstName: document.getElementById('firstName').value,
      lastName: document.getElementById('lastName').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      address: document.getElementById('address').value,
      employeeType: type,
      position: document.getElementById('position').value,
      department: document.getElementById('department').value,
      status: document.getElementById('status').value,
      dateHired: document.getElementById('hireDate').value,
      sssNumber: document.getElementById('sssNumber').value,
      philhealthNumber: document.getElementById('philhealthNumber').value,
      tin: document.getElementById('tin').value,
      pagibigNumber: document.getElementById('pagibigNumber').value,
    };
    if (type === 'full-time') {
      payload.basicSalary = parseFloat(document.getElementById('monthlyRate').value) || 0;
      payload.overtimeRate = parseFloat(document.getElementById('overtimeRate').value) || 0;
    } else if (type === 'part-time') {
      payload.hourlyRate = parseFloat(document.getElementById('hourlyRate').value) || 0;
      payload.hoursPerWeek = parseInt(document.getElementById('maxHoursPerWeek').value) || 0;
    } else if (type === 'contract') {
      payload.dailyRate = parseFloat(document.getElementById('dailyRate').value) || 0;
      payload.contractEndDate = document.getElementById('contractEnd').value;
    }

    try {
      if (isEdit) {
        await API.put('/employees/' + empId, payload);
        Toast.success('Employee updated successfully!');
      } else {
        await API.post('/employees', payload);
        Toast.success('Employee created successfully!');
      }
      setTimeout(() => window.location.href = '/employees', 1200);
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('d-none');
    } finally {
      btn.disabled = false;
      spinner.classList.add('d-none');
    }
  });

  updateRateFields();
  if (isEdit && empId) loadEmployee(empId);
</script>
</body>
</html>
