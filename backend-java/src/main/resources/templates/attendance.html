<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance - MotorPH Payroll</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="/css/app.css" rel="stylesheet"/>
</head>
<body>
<div class="d-flex">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <main class="main-content flex-grow-1">
    <div class="page-header">
      <h1 class="text-white">Attendance</h1>
      <p>Track daily clock-in and clock-out records.</p>
    </div>

    <div class="row g-4">
      <!-- Clock Panel -->
      <div class="col-12 col-lg-4">
        <div class="glass-card text-center">
          <h6 class="fw-semibold text-white mb-3">
            <i class="bi bi-clock me-2" style="color:#a5b4fc;"></i>Time Tracker
          </h6>
          <div class="clock-display my-3" id="live-clock">00:00:00</div>
          <div class="text-muted small mb-4" id="live-date"></div>

          <div class="mb-3">
            <label class="form-label text-start d-block">Select Employee</label>
            <select id="clock-employee" class="form-select">
              <option value="">-- Select Employee --</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label text-start d-block">Notes (Optional)</label>
            <input type="text" id="clock-notes" class="form-control" placeholder="Work from home, etc."/>
          </div>

          <div class="d-grid gap-2">
            <button class="btn btn-primary py-2 fw-semibold" id="clock-in-btn" onclick="doClock('in')">
              <i class="bi bi-box-arrow-in-right me-2"></i>Clock In
            </button>
            <button class="btn btn-outline-danger py-2 fw-semibold" id="clock-out-btn" onclick="doClock('out')">
              <i class="bi bi-box-arrow-right me-2"></i>Clock Out
            </button>
          </div>
        </div>
      </div>

      <!-- Today's Attendance -->
      <div class="col-12 col-lg-8">
        <div class="glass-card">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h6 class="fw-semibold text-white mb-0">
              <i class="bi bi-list-check me-2" style="color:#6ee7b7;"></i>Today's Attendance
            </h6>
            <button class="btn btn-outline-light btn-sm" onclick="loadTodayAttendance()">
              <i class="bi bi-arrow-clockwise me-1"></i>Refresh
            </button>
          </div>
          <div class="table-responsive">
            <table class="table glass-table mb-0">
              <thead>
              <tr>
                <th>Employee</th>
                <th>Clock In</th>
                <th>Clock Out</th>
                <th>Hours</th>
                <th>Status</th>
              </tr>
              </thead>
              <tbody id="today-body">
              <tr><td colspan="5" class="text-center text-muted py-4">
                <div class="spinner-border spinner-border-sm me-2"></div>Loading...
              </td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Historical Attendance -->
    <div class="glass-card mt-4">
      <div class="d-flex flex-wrap gap-3 justify-content-between align-items-end mb-4">
        <h6 class="fw-semibold text-white mb-0">
          <i class="bi bi-calendar3 me-2" style="color:#fcd34d;"></i>Attendance History
        </h6>
        <div class="d-flex flex-wrap gap-2">
          <div>
            <label class="form-label mb-1" style="font-size:0.75rem;">Employee</label>
            <select id="hist-employee" class="form-select form-select-sm" style="width:180px;"></select>
          </div>
          <div>
            <label class="form-label mb-1" style="font-size:0.75rem;">Start Date</label>
            <input type="date" id="hist-start" class="form-control form-control-sm"/>
          </div>
          <div>
            <label class="form-label mb-1" style="font-size:0.75rem;">End Date</label>
            <input type="date" id="hist-end" class="form-control form-control-sm"/>
          </div>
          <div class="d-flex align-items-end">
            <button class="btn btn-primary btn-sm" onclick="loadHistory()">
              <i class="bi bi-search me-1"></i>Search
            </button>
          </div>
        </div>
      </div>
      <div class="table-responsive">
        <table class="table glass-table mb-0">
          <thead>
          <tr>
            <th>Date</th>
            <th>Employee</th>
            <th>Clock In</th>
            <th>Clock Out</th>
            <th>Hours Worked</th>
            <th>Status</th>
            <th>Notes</th>
          </tr>
          </thead>
          <tbody id="history-body">
          <tr><td colspan="7" class="text-center text-muted py-4">Select filters and search to view history</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
  if (!Auth.requireAuth()) { /* redirected */ }

  // Live clock
  function updateClock() {
    const now = new Date();
    document.getElementById('live-clock').textContent = now.toLocaleTimeString('en-US', { hour12: false });
    document.getElementById('live-date').textContent = now.toLocaleDateString('en-US', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Default date range (this week)
  const today = new Date();
  const weekStart = new Date(today); weekStart.setDate(today.getDate() - 6);
  document.getElementById('hist-start').value = weekStart.toISOString().slice(0, 10);
  document.getElementById('hist-end').value = today.toISOString().slice(0, 10);

  async function loadEmployeeLists() {
    try {
      const employees = await API.get('/employees?status=active');
      const clockSel = document.getElementById('clock-employee');
      const histSel = document.getElementById('hist-employee');
      const opts = employees.map(e =>
        `<option value="${e._id}">${e.firstName} ${e.lastName}</option>`
      ).join('');
      clockSel.innerHTML = '<option value="">-- Select Employee --</option>' + opts;
      histSel.innerHTML = '<option value="">All Employees</option>' + opts;
    } catch (err) {
      Toast.error('Failed to load employees');
    }
  }

  async function loadTodayAttendance() {
    try {
      const records = await API.get('/attendance/today');
      const tbody = document.getElementById('today-body');
      if (!records.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No attendance records for today</td></tr>';
        return;
      }
      tbody.innerHTML = records.map(r => `
        <tr>
          <td>
            <div class="d-flex align-items-center gap-2">
              <div class="emp-avatar" style="width:30px;height:30px;font-size:0.75rem;">${getInitials(r.employeeName || '?')}</div>
              <span class="small fw-semibold text-white">${r.employeeName || '-'}</span>
            </div>
          </td>
          <td class="small text-white">${formatTime(r.clockIn)}</td>
          <td class="small text-muted">${r.clockOut ? formatTime(r.clockOut) : '<span class="text-warning">In Progress</span>'}</td>
          <td class="small text-white">${r.hoursWorked ? r.hoursWorked.toFixed(2) + 'h' : '-'}</td>
          <td>${getAttendanceBadge(r.status)}</td>
        </tr>
      `).join('');
    } catch (err) {
      Toast.error('Failed to load attendance: ' + err.message);
    }
  }

  async function loadHistory() {
    const empId = document.getElementById('hist-employee').value;
    const start = document.getElementById('hist-start').value;
    const end = document.getElementById('hist-end').value;
    const params = new URLSearchParams();
    if (empId) params.append('employeeId', empId);
    if (start) params.append('startDate', start);
    if (end) params.append('endDate', end);

    try {
      const records = await API.get('/attendance?' + params.toString());
      const tbody = document.getElementById('history-body');
      if (!records.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No records found</td></tr>';
        return;
      }
      tbody.innerHTML = records.map(r => `
        <tr>
          <td class="small text-muted">${r.date || '-'}</td>
          <td class="small text-white fw-semibold">${r.employeeName || '-'}</td>
          <td class="small text-white">${formatTime(r.clockIn)}</td>
          <td class="small text-muted">${r.clockOut ? formatTime(r.clockOut) : '-'}</td>
          <td class="small text-white">${r.hoursWorked ? r.hoursWorked.toFixed(2) + 'h' : '-'}</td>
          <td>${getAttendanceBadge(r.status)}</td>
          <td class="small text-muted">${r.notes || '-'}</td>
        </tr>
      `).join('');
    } catch (err) {
      Toast.error('Failed to load history: ' + err.message);
    }
  }

  async function doClock(action) {
    const empId = document.getElementById('clock-employee').value;
    if (!empId) { Toast.error('Please select an employee'); return; }
    const notes = document.getElementById('clock-notes').value;
    try {
      const endpoint = action === 'in' ? '/attendance/clock-in' : '/attendance/clock-out';
      await API.post(endpoint, { employeeId: empId, notes });
      Toast.success(`Clock-${action} recorded!`);
      document.getElementById('clock-notes').value = '';
      loadTodayAttendance();
    } catch (err) {
      Toast.error('Failed: ' + err.message);
    }
  }

  loadEmployeeLists();
  loadTodayAttendance();
</script>
</body>
</html>
