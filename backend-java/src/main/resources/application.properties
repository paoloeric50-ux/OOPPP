# ============================================================
# MotorPH Payroll System - Application Configuration
# Author: Group 5 - MO-IT101
# ============================================================

# Server settings
# Port 5000 is used so this works in the Replit environment
# 0.0.0.0 means accept connections from any network interface
server.port=5000
server.address=0.0.0.0
# Trust forwarded headers from Replit's HTTPS proxy
# This ensures redirects use https:// instead of http://
server.forward-headers-strategy=native

# ============================================================
# H2 Database Configuration
# H2 is an embedded Java SQL database — it runs inside the app,
# no separate database server needed. Data is saved to a file
# so it persists even after the app is restarted.
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/motorph_db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA / Hibernate Settings
# Hibernate is the ORM (Object-Relational Mapper) that converts
# between Java objects and SQL database rows.
# ============================================================

# H2Dialect tells Hibernate which SQL dialect to use
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# "update" = Hibernate updates the table structure when the app starts
# If a table doesn't exist yet, it creates it automatically
# Other options: "create" (drops and recreates), "validate" (just checks)
spring.jpa.hibernate.ddl-auto=update

# Set to true when debugging to see all SQL queries in the console
spring.jpa.show-sql=false

# Keep this false — if set to true, H2 treats column types like TEXT as
# quoted identifiers instead of SQL type names, which causes errors
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# ============================================================
# JWT (JSON Web Token) Settings
# The secret key is used to sign and verify login tokens.
# In production, replace the default secret with a long random string
# stored in an environment variable (JWT_SECRET).
# ============================================================
jwt.secret=${JWT_SECRET:motorph-secret-key-2024}
jwt.expiration-hours=24

# ============================================================
# Other Settings
# ============================================================

# Allowed CORS origins for API requests (use environment variable in production)
cors.origins=${CORS_ORIGINS:*}

# Allow services to override Spring beans with the same name
spring.main.allow-bean-definition-overriding=true

# Log level for our code (INFO = normal operation messages)
logging.level.com.motorph=INFO

# Thymeleaf template engine settings
# cache=false during development so changes appear without restart
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Where to look for static files (CSS, JS, images)
spring.web.resources.static-locations=classpath:/static/
